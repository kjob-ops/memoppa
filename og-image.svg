<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F6E56"/>
      <stop offset="100%" style="stop-color:#0a4f3e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装飾ドット -->
  <circle cx="1100" cy="80" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="550" r="120" fill="rgba(255,255,255,0.04)"/>

  <!-- ロゴ -->
  <rect x="60" y="60" width="68" height="68" rx="18" fill="white"/>
  <text x="94" y="108" font-family="Arial,sans-serif" font-size="40" font-weight="800" fill="#0F6E56" text-anchor="middle">m</text>
  <text x="150" y="106" font-family="Arial,sans-serif" font-size="36" font-weight="800" fill="white">memoppa</text>

  <!-- メインコピー -->
  <text x="60" y="240" font-family="Arial,sans-serif" font-size="64" font-weight="800" fill="white">AIプロンプトが</text>
  <text x="60" y="320" font-family="Arial,sans-serif" font-size="64" font-weight="800" fill="white">育つメモ帳</text>

  <!-- サブコピー -->
  <text x="60" y="400" font-family="Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.75)">ChatGPT・Claude・Geminiのプロンプトを登録して、</text>
  <text x="60" y="438" font-family="Arial,sans-serif" font-size="26" fill="rgba(255,255,255,0.75)">タブを開いて2秒でコピー。</text>

  <!-- 特徴チップ -->
  <rect x="60" y="490" width="170" height="48" rx="24" fill="rgba(255,255,255,0.15)"/>
  <text x="145" y="521" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle">⚡ プロンプト管理</text>

  <rect x="248" y="490" width="150" height="48" rx="24" fill="rgba(255,255,255,0.15)"/>
  <text x="323" y="521" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle">🔗 共有機能</text>

  <rect x="416" y="490" width="170" height="48" rx="24" fill="rgba(255,255,255,0.15)"/>
  <text x="501" y="521" font-family="Arial,sans-serif" font-size="20" fill="white" text-anchor="middle">📱 スマホ対応</text>

  <!-- URL -->
  <text x="1140" y="600" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)" text-anchor="end">memoppa.app</text>
</svg>
