<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>memoppa OGP Mockup</title>
<style>
  /* OGP標準サイズ 1200x630 に固定 */
  .ogp-mockup {
    width: 1200px;
    height: 630px;
    background-color: #FBBF24; /* タイムラインで目を引く高彩度イエロー */
    color: #111827;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    padding: 60px 80px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  
  /* ブランドロゴ部分 */
  .brand {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-icon {
    background: #111827;
    color: #FBBF24;
    padding: 4px 16px;
    border-radius: 8px;
  }
  
  /* メインコンテンツ（中央寄せ） */
  .content {
    margin-top: auto;
    margin-bottom: auto;
  }
  
  /* プロンプトタイトル：極大サイズでインパクトを出す */
  .title {
    font-size: 72px;
    font-weight: bold;
    line-height: 1.25;
    margin: 0 0 32px 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  
  /* プロンプト本文のチラ見せ部分 */
  .snippet {
    font-size: 36px;
    line-height: 1.5;
    color: #1F2937;
    background: rgba(255, 255, 255, 0.6);
    padding: 24px 32px;
    border-radius: 16px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    border-left: 8px solid #111827;
  }
  
  /* フッター（CTA） */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 28px;
    font-weight: bold;
    color: #4B5563;
  }
  
  .cta-button {
    background: #111827;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 100px;
    font-size: 32px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

  <!-- ここからOGP画像のプレビュー枠 -->
  <div class="ogp-mockup">
    <!-- ヘッダー -->
    <div class="brand">
      <span class="brand-icon">M</span> memoppa
    </div>
    
    <!-- メイン -->
    <div class="content">
      <h1 class="title">💡 キャッチコピー・アイデア出し</h1>
      <div class="snippet">
        以下のテーマとキーワードを元に、ターゲットが思わずクリックしたくなる魅力的なタイトル案を5つ出してください。テーマ: {{テーマ}}
      </div>
    </div>
    
    <!-- フッター -->
    <div class="footer">
      <div>みんなのプロンプトをシェア</div>
      <div class="cta-button">ワンクリックで使う ⚡️</div>
    </div>
  </div>

</body>
</html>
